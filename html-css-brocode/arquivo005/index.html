<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo Table</title>
</head>
<body>
    <h3>Store Hours</h3>

    <table style="border-style: dashed; background-color: rgb(0, 0, 0);">
        <tr style="background-color: aqua; border-style: dashed;">
            <th width="100">Sunday</th>
            <th width="100">Monday</th>
            <th width="100">Tuesday</th>
            <th width="100">Wednesday</th>
            <th width="100">Thursday</th>
            <th width="100">Friday</th>
            <th width="100">Saturday</th>
        </tr>
        <tr style="text-align: center; background-color: aliceblue; border-style: dashed;"> 
            <td>CLOSED</td>
            <td>9-5</td>
            <td>9-5</td>
            <td>9-5</td>
            <td>9-5</td>
            <td>9-5</td>
            <td>10-2</td>
        </tr>
    </table>
</body>
</html>
