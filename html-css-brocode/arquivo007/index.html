<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="index.html" method="post" enctype="multipart/form-data">
        <label for="username">Username:</label>
        <input type="text" id="username" minlength="2" required maxlength="19" placeholder="Arthur123">
        <br>

        <label for="password">Password:</label>
        <input type="password" id="password" minlength="2" maxlength="19" required placeholder="123_123">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" minlength="2" required maxlength="19" placeholder="arthur@gmail.com">
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" minlength="2" maxlength="19" required placeholder="51-991-234-567" pattern="[0-9]{2}-[0-9]{3}-[0-9]{3}-[0-9]{3}">
        <br>

        <label for="subscribe">Subscribe:</label>
        <input type="checkbox" id="subscribe">
        <br>

        <label for="title">Title:</label>
        
        <label for="Goat">Goat</label>
        <input type="radio" id="Goat" name="title">


        <input type="reset"><br>
        <input type="submit">
    </form>
</body>
</html>
