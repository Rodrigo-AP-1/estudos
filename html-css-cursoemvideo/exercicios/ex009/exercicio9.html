<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aprendendo varias listas">
    <meta name="author" content="Rodrigo">
    <title>Listas OL e UL</title>
</head>
<body>
    <header>
        <h1>Trabalhando com Listas</h1>
    </header>
    <main>
        <section>
            <article>
                <h2>Listas Ordenadas</h2>
                <ol>
                    <li>Acordar</li>
                    <li>Escovar os Dentes</li>
                    <li>Tomar Cafe</li>
                    <li>Ir para Faculdade</li>
                </ol>
            </article>
            <article>
                <h2>Listas Nao Ordenadas</h2>
                <ul>
                    <li>Comprar Pao</li>
                    <li>Comprar Arroz</li>
                    <li>Comprar Cafe</li>
                    <li>Comprar Feijao</li>
                    <li>Comprar Pizza</li>
                </ul>
            </article>
        </section>
    </main>
</body>
</html>
